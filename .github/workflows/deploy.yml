name: Deploy to VPS

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/richardtandean/klip-app

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
      - run: npm ci
      - run: npm run typecheck || true

  build-and-push:
    needs: lint
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - backend
          - frontend
          - langgraph-agent
          - remotion-mcp
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build backend
        if: matrix.service == 'backend'
        run: |
          docker build \
            -f apps/backend/Dockerfile \
            -t ${{ env.IMAGE_PREFIX }}-backend:latest \
            .

      - name: Build frontend
        if: matrix.service == 'frontend'
        run: |
          docker build \
            --build-arg NEXT_PUBLIC_API_URL=https://klip.richardtandean.my.id/api \
            --build-arg NEXT_PUBLIC_WS_URL=https://klip.richardtandean.my.id \
            -f apps/frontend/Dockerfile \
            -t ${{ env.IMAGE_PREFIX }}-frontend:latest \
            .

      - name: Build langgraph-agent
        if: matrix.service == 'langgraph-agent'
        run: |
          docker build \
            -f apps/langgraph-agent/Dockerfile \
            -t ${{ env.IMAGE_PREFIX }}-langgraph-agent:latest \
            apps/langgraph-agent

      - name: Build remotion-mcp
        if: matrix.service == 'remotion-mcp'
        run: |
          docker build \
            -f packages/remotion-mcp/Dockerfile \
            -t ${{ env.IMAGE_PREFIX }}-remotion-mcp:latest \
            .

      - name: Push images
        run: |
          docker push ${{ env.IMAGE_PREFIX }}-${{ matrix.service }}:latest || true

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Copy files to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "docker-compose.prod.yml,.env.production"
          target: "/home/deploy/klip-saas/"

      - name: Deploy on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /home/deploy/klip-saas
            docker compose -f docker-compose.prod.yml pull || true
            docker compose -f docker-compose.prod.yml up -d --remove-orphans
            docker compose -f docker-compose.prod.yml ps

      - name: Health check
        run: |
          curl -sSf -o /dev/null -w "%{http_code}" https://klip.richardtandean.my.id/api/health || echo "Health check skipped (SSL may need initial setup)"
